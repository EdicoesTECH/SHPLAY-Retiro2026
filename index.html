<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faça seu Crachá — Do Deserto à Ressurreição</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app">

    <!-- Fundo decorativo com folhas e textura -->
    <div class="bg-decoration">
      <div class="bg-texture"></div>
      <div class="bg-vignette"></div>
      <!-- Folhas SVG decorativas (canto superior direito) -->
      <svg class="leaves-deco" viewBox="0 0 420 380" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Galho principal -->
        <path d="M280 10 C310 60 330 120 300 200 C280 260 260 310 240 370" stroke="#c8843a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Galhos secundários -->
        <path d="M300 200 C340 180 380 190 410 170" stroke="#c8843a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M310 130 C355 110 390 115 415 100" stroke="#c8843a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M290 80 C330 55 360 60 385 45" stroke="#c8843a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M295 260 C335 250 365 260 390 245" stroke="#c8843a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <!-- Cruz -->
        <rect x="355" y="30" width="14" height="90" rx="4" fill="#b8672a" opacity="0.85"/>
        <rect x="330" y="58" width="64" height="13" rx="4" fill="#b8672a" opacity="0.85"/>
        <!-- Folhas grandes -->
        <ellipse cx="380" cy="168" rx="28" ry="18" fill="#e8922a" opacity="0.9" transform="rotate(-25 380 168)"/>
        <ellipse cx="380" cy="168" rx="28" ry="18" fill="none" stroke="#c8762a" stroke-width="1" transform="rotate(-25 380 168)"/>
        <line x1="366" y1="172" x2="392" y2="163" stroke="#c8762a" stroke-width="0.8"/>

        <ellipse cx="408" cy="150" rx="22" ry="14" fill="#d4762a" opacity="0.85" transform="rotate(-15 408 150)"/>
        <ellipse cx="408" cy="150" rx="22" ry="14" fill="none" stroke="#b86020" stroke-width="1" transform="rotate(-15 408 150)"/>

        <ellipse cx="355" cy="195" rx="24" ry="16" fill="#e8a040" opacity="0.9" transform="rotate(20 355 195)"/>
        <ellipse cx="355" cy="195" rx="24" ry="16" fill="none" stroke="#c8802a" stroke-width="1" transform="rotate(20 355 195)"/>

        <ellipse cx="395" cy="115" rx="26" ry="15" fill="#cd6e22" opacity="0.85" transform="rotate(-30 395 115)"/>
        <ellipse cx="395" cy="115" rx="26" ry="15" fill="none" stroke="#a85a18" stroke-width="1" transform="rotate(-30 395 115)"/>

        <ellipse cx="375" cy="48" rx="20" ry="13" fill="#e09030" opacity="0.8" transform="rotate(-20 375 48)"/>

        <ellipse cx="380" cy="255" rx="22" ry="14" fill="#d4762a" opacity="0.8" transform="rotate(15 380 255)"/>
        <ellipse cx="380" cy="255" rx="22" ry="14" fill="none" stroke="#b86020" stroke-width="1" transform="rotate(15 380 255)"/>

        <ellipse cx="350" cy="275" rx="18" ry="11" fill="#e89030" opacity="0.75" transform="rotate(-10 350 275)"/>

        <!-- Folhas menores espalhadas -->
        <ellipse cx="305" cy="155" rx="14" ry="9" fill="#cd7030" opacity="0.7" transform="rotate(40 305 155)"/>
        <ellipse cx="318" cy="230" rx="12" ry="8" fill="#e09040" opacity="0.65" transform="rotate(-35 318 230)"/>
      </svg>

      <!-- Folhas canto inferior esquerdo -->
      <svg class="leaves-deco leaves-bottom" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 200 C40 170 60 130 50 80" stroke="#c8843a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
        <ellipse cx="30" cy="120" rx="20" ry="13" fill="#e8922a" opacity="0.4" transform="rotate(30 30 120)"/>
        <ellipse cx="55" cy="90" rx="16" ry="10" fill="#d4762a" opacity="0.35" transform="rotate(-20 55 90)"/>
      </svg>
    </div>

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="event-logo">
          <span class="logo-label">RETIRO QUARESMAL ONLINE</span>
          <span class="logo-title" id="event-name-header">Do Deserto à Ressurreição</span>
        </div>
        <div class="header-dates">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
          27 e 28 de Março
        </div>
      </div>
    </header>

    <!-- Hero title -->
    <div class="hero-title-block">
      <p class="hero-sub">Crie seu crachá para o retiro</p>
      <h1 class="hero-title">
        <em>A tua travessia</em><br>
        começa aqui
      </h1>
      <div class="hero-divider">
        <span></span><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L12 22M2 12L22 12" stroke="#d4a843" stroke-width="2" stroke-linecap="round"/></svg><span></span>
      </div>
    </div>

    <!-- Main layout -->
    <main class="main-layout">
      <!-- Chat panel -->
      <section class="chat-panel">
        <div class="chat-header">
          <div class="bot-avatar">
            <!-- Ícone de cruz/chama -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 2 C12 2 8 7 8 11 C8 13.2 9.8 15 12 15 C14.2 15 16 13.2 16 11 C16 7 12 2 12 2Z" fill="currentColor" opacity="0.9"/>
              <path d="M12 15 L12 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M8 19 L16 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="bot-info">
            <span class="bot-name">Guia do Retiro</span>
            <span class="bot-status"><span class="status-dot"></span> Online agora</span>
          </div>
        </div>

        <div class="messages-container" id="messages-container"></div>

        <div class="input-area" id="input-area"></div>
      </section>

      <!-- Preview panel -->
      <section class="preview-panel" id="preview-panel">
        <div class="preview-placeholder" id="preview-placeholder">
          <!-- Ícone central decorativo -->
          <div class="placeholder-cross">
            <svg width="52" height="62" viewBox="0 0 52 62" fill="none">
              <rect x="22" y="0" width="8" height="62" rx="4" fill="#8b5a9e" opacity="0.25"/>
              <rect x="6" y="16" width="40" height="8" rx="4" fill="#8b5a9e" opacity="0.25"/>
            </svg>
          </div>
          <p class="placeholder-title">Seu crachá</p>
          <p class="placeholder-text">Converse com o guia ao lado<br/>e crie sua credencial do retiro</p>
          <div class="placeholder-leaves">
            <svg width="80" height="40" viewBox="0 0 80 40" fill="none">
              <ellipse cx="20" cy="25" rx="18" ry="11" fill="#e8922a" opacity="0.2" transform="rotate(-20 20 25)"/>
              <ellipse cx="45" cy="20" rx="16" ry="10" fill="#d4762a" opacity="0.18" transform="rotate(15 45 20)"/>
              <ellipse cx="65" cy="28" rx="14" ry="9" fill="#e09030" opacity="0.2" transform="rotate(-10 65 28)"/>
            </svg>
          </div>
        </div>
        <div class="canvas-wrapper" id="canvas-wrapper" style="display:none">
          <canvas id="badge-canvas"></canvas>
          <div class="canvas-actions">
            <button class="btn-download" id="btn-download">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <path d="M12 3v13M7 11l5 5 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 20h18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
              Baixar meu crachá
            </button>
            <button class="btn-share" id="btn-share">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="1.8"/>
                <line x1="8.6" y1="13.5" x2="15.4" y2="17.5" stroke="currentColor" stroke-width="1.8"/>
                <line x1="15.4" y1="6.5" x2="8.6" y2="10.5" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              Compartilhar
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <span>Ordo Amoris · Retiro Quaresmal 2025</span>
    </footer>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none" />
  <script type="module" src="src/main.js"></script>
</body>
</html>
